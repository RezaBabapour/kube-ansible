---
- name: Create /etc/etcd and /var/lib/etcd directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
  loop:
    - /etc/etcd
    - /var/lib/etcd

- name: Copy files to /etc/etcd
  copy:
    src: "{{ item }}"
    dest: /etc/etcd/
  with_items:
    - ~/ca.pem
    - ~/kubernetes-key.pem
    - ~/kubernetes.pem

- name: Create etcd systemd unit file
  template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    mode: 644

- name: Restart etcd
  systemd:
    name: etcd
    state: restarted
    daemon_reload: yes
    enabled: yes
